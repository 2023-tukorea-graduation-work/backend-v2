server:
  servlet:
    context-path: /api/v1
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${datasource-url}
    username: ${datasource-username}
    password: ${datasource-password}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

#    enabled: true
#    encoding: UTF-8
#    baseline-on-migrate: true
#    locations: classpath:db/migration/local

#  cache:
#    type: redis
#    redis:
#      time-to-live: 60000
#      cache-null-values: true
#
#  redis:
#    host: localhost
#    port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      location: src/main/resources/files

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    enabled: true  # Swagger API 문서 생성 활성화 여부
    path: /api-docs  # API 문서 경로
  swagger-ui:
    enabled: true  # Swagger UI 활성화 여부
    path: /swagger-ui.html  # Swagger UI 경로

# Hibernate
logging:
  level:
    com:
      querydsl: DEBUG
    org:
      hibernate:
        SQL: DEBUG
        BasicBinder: TRACE

cloud:
  aws:
    s3:
      bucket: 2023-tukorea-graduation-mento
    credentials:
      access-key: ${access-key}
      secret-key: ${secret-key}
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false

app:
  cors:
    # comma (',') seperated list of allowed origins for CORS
    allowed-origins: http://localhost, http://localhost:3000
